<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        #game-wrapper {
            position: relative;
            border: 2px solid #333;
        }
        canvas {
            display: block;
            background: #1a1a2e;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #restart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            z-index: 10;
            pointer-events: auto;
        }
        #restart-btn:hover { background: #ff6b81; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Score: <span id="scoreDisplay">0</span></div>
    </div>
    <div id="instructions">← → move &nbsp;|&nbsp; SPACE / ↑ jump</div>
    <div id="controls">procedural platformer</div>
    <button id="restart-btn">💀 Restart</button>
</div>
<script>
// ============================================================
//  Procedural Platformer — single-file game for GitHub Pages
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('scoreDisplay');
const restartBtn = document.getElementById('restart-btn');

// --- Dimensions ---
const W = 800;
const H = 500;
canvas.width = W;
canvas.height = H;

// --- Constants ---
const GRAVITY = 0.6;
const JUMP_FORCE = -11;

const MOVE_SPEED = 5;
const ACCELERATION = 0.8;
const DRAG = 0.92; // lower = more friction, higher = more slippery
const COYOTE_TIME = 8;
const JUMP_BUFFER_TIME = 8;

const JUMP_CUT = 0.5; // variable jump strength
const MAX_JUMP_DISTANCE = 170;
const PLAYER_W = 22;
const PLAYER_H = 28;
const PLATFORM_MIN_W = 50;
const PLATFORM_MAX_W = 120;
const PLATFORM_H = 14;
const GAP_MIN = 80;
const VERTICAL_STEP_MIN = -40;   // can go up or down
const VERTICAL_STEP_MAX = 50;
const SEGMENTS_AHEAD = 20;
const SEGMENTS_BEHIND = 5;

// --- Game State ---
let player, camera, platforms, score, gameOver, keys;

function init() {
    player = {
        x: 60,
        y: 0,
        w: PLAYER_W,
        h: PLAYER_H,
        vx: 0,
        vy: 0,
        onGround: false,
        jumpHeld: false,
        coyoteTimer: 0,
        jumpBufferTimer: 0,
    };
    camera = { x: 0, y: 0 };
    platforms = [];
    score = 0;
    gameOver = false;
    keys = { left: false, right: false, jump: false };
    restartBtn.style.display = 'none';

    generateInitialPlatforms();
    player.y = platforms[0].y - PLAYER_H;
    updateScore();
}

function maxGapForHeight(heightDiff) {
    const penalty = Math.max(0, heightDiff) * 1.2;
    return Math.max(60, MAX_JUMP_DISTANCE - penalty);
}

// --- Procedural Generation ---
function generateInitialPlatforms() {

    platforms = [];

    let x = 0;
    let y = H - 80;

    while (x < 3000) {

        const w = rand(PLATFORM_MIN_W, PLATFORM_MAX_W);

        platforms.push({
            x,
            y,
            w,
            h: PLATFORM_H,
            scored: false
        });

        const nextY = clamp(
            y + rand(VERTICAL_STEP_MIN, VERTICAL_STEP_MAX),
            80,
            H - 40
        );

        const maxGap = maxGapForHeight(y - nextY);

        const gap = rand(70, Math.max(70, maxGap));

        x += w + gap;
        y = nextY;
    }
}

function generateMorePlatforms() {
    const last = platforms[platforms.length - 1];

    const y = clamp(
        last.y + rand(VERTICAL_STEP_MIN, VERTICAL_STEP_MAX),
        80,
        H - 40
    );

    const heightDiff = last.y - y;
    const maxGap = maxGapForHeight(heightDiff);

    const gap = rand(70, Math.max(70, maxGap));

    const w = rand(PLATFORM_MIN_W, PLATFORM_MAX_W);

    const x = last.x + last.w + gap;

    platforms.push({
        x,
        y,
        w,
        h: PLATFORM_H,
        scored: false
    });
}

function trimPlatforms() {
    while (
        platforms.length > 0 &&
        platforms[0].x + platforms[0].w < camera.x - 500
    ) {
        platforms.shift();
    }
}

// --- Helpers ---
function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
function clamp(v, mn, mx) {
    return Math.max(mn, Math.min(mx, v));
}

// --- Input ---
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
        e.preventDefault();
        keys.jump = true;
    }
});
document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
        keys.jump = false;
    }
});
restartBtn.addEventListener('click', init);

// --- Physics & Update ---
function update() {
    if (gameOver) return;

    // Horizontal movement
    // Horizontal movement with acceleration + drag
let move = 0;

if (keys.left) move -= 1;
if (keys.right) move += 1;

// accelerate while pressing a direction
if (move !== 0) {
    player.vx += move * ACCELERATION;
}
}

// slow down when no key is pressed
else {
    if (player.onGround) {
        player.vx *= 0.82; // ground friction
    } else {
        player.vx *= 0.98; // preserve air momentum
    }
}

    // limit maximum speed
    player.vx = clamp(player.vx, -MOVE_SPEED, MOVE_SPEED);

    // coyote time
    if (player.onGround) {
        player.coyoteTimer = COYOTE_TIME;
    } else {
        player.coyoteTimer--;
    }

    // jump buffering
    if (keys.jump) {
        player.jumpBufferTimer = JUMP_BUFFER_TIME;
    } else {
        player.jumpBufferTimer--;
    }

    // Jump
    if (
    player.jumpBufferTimer > 0 &&
    player.coyoteTimer > 0
    ) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpHeld = true;

    player.jumpBufferTimer = 0;
    player.coyoteTimer = 0;
    }

    // Variable jump height
    if (!keys.jump && player.jumpHeld && player.vy < 0) {
    player.vy *= JUMP_CUT;
    player.jumpHeld = false;
    }
    
    // Gravity
    player.vy += GRAVITY;
    if (player.vy > 15) player.vy = 15; // terminal velocity

    // Move horizontally + collisions
    player.x += player.vx;
    resolveHorizontalCollisions();

    // Move vertically + collisions
    player.y += player.vy;
    player.onGround = false;
    resolveVerticalCollisions();

    // Fall off screen → game over
    if (player.y > H + 100) {
        gameOver = true;
        restartBtn.style.display = 'block';
        return;
    }

    // Camera follows player
    const targetX = player.x - W / 3;
    const targetY = player.y - H / 2;

    camera.x += (targetX - camera.x) * 0.1;
    camera.y += (targetY - camera.y) * 0.1;

    // Generate more platforms as we go
    while (
        platforms[platforms.length - 1].x <
        camera.x + W + 1200
    ) {
        generateMorePlatforms();
    }
        
        trimPlatforms();

    // Score: count platforms we've passed
    for (const p of platforms) {
        if (!p.scored && p.x + p.w < player.x) {
            p.scored = true;
            score++;
        }
    }
    updateScore();
}

function resolveHorizontalCollisions() {
    for (const p of platforms) {
        if (rectOverlap(player, p)) {
            if (player.vx > 0) {
                player.x = p.x - player.w;
                player.vx = 0;
            } 
            else if (player.vx < 0) {
                player.x = p.x + p.w;
                player.vx = 0;
            }
        }
    }
}

function resolveVerticalCollisions() {
    const previousBottom = player.y - player.vy + player.h;

    for (const p of platforms) {

        if (
            player.vy > 0 &&
            previousBottom <= p.y &&
            player.y + player.h >= p.y &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w
        ) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.onGround = true;
        }

        if (
            player.vy < 0 &&
            player.y <= p.y + p.h &&
            player.y >= p.y &&
            player.x + player.w > p.x &&
            player.x < p.x + p.w
        ) {
            player.y = p.y + p.h;
            player.vy = 0;
        }
    }
}

function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

// --- Render ---
function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Draw platforms
    for (const p of platforms) {
        const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
        grad.addColorStop(0, '#4a90d9');
        grad.addColorStop(1, '#2c5f8a');
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // top highlight
        ctx.fillStyle = '#6bb0f5';
        ctx.fillRect(p.x, p.y, p.w, 3);
    }

    // Draw player
    ctx.fillStyle = '#e94560';
    ctx.shadowColor = '#e94560';
    ctx.shadowBlur = 12;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x + 5, player.y + 8, 5, 6);
    ctx.fillRect(player.x + 12, player.y + 8, 5, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(player.x + 6, player.y + 9, 3, 4);
    ctx.fillRect(player.x + 13, player.y + 9, 3, 4);

    ctx.restore();
}

function updateScore() {
    scoreDisplay.textContent = score;
}

// --- Game Loop ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// --- Start ---
init();
gameLoop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        #game-wrapper {
            position: relative;
            border: 2px solid #333;
        }
        canvas {
            display: block;
            background: #1a1a2e;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }
        #restart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            z-index: 10;
            pointer-events: auto;
        }
        #restart-btn:hover { background: #ff6b81; }
        
        /* Pause indicator */
        #pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            font-family: monospace;
            text-shadow: 2px 2px 4px #000;
            display: none;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Score: <span id="scoreDisplay">0</span></div>
        <div>High Score: <span id="highScoreDisplay">0</span></div>
    </div>
    <div id="instructions">← → move &nbsp;|&nbsp; SPACE / ↑ jump &nbsp;|&nbsp; ESC pause</div>
    <div id="controls">procedural platformer</div>
    <button id="restart-btn">🎮 Restart</button>
    <div id="pause-indicator">⏸️ PAUSED</div>
</div>

<!-- Load game script -->
<script src="game.js"></script>
</body>
</html>
